      <div class="map-wrapper">

      <script>
        // API base URL - 1. HTML-dəki kimi (lazım deyil, amma saxlayıram)
        const API_URL = "https://map-api.ayna.gov.az";

        // State dəyişənləri
        let map = null;
        let dataLayer = null;
        let geojsonData = null;

        // Elementlər
        const regionFilter = document.getElementById("regionFilter");
        const dataTypeFilter = document.getElementById("dataType");

        // Rəng skalası (2. HTML-dəki kimi qalır)
        function getColor(value, region) {
          if (region === "micro") {
            return value > 50000
              ? "#800026"
              : value > 25000
                ? "#BD0026"
                : value > 12500
                  ? "#E31A1C"
                  : value > 6000
                    ? "#FC4E2A"
                    : value > 3000
                      ? "#FD8D3C"
                      : "#FEB24C";
          } else if (region === "meso") {
            return value > 1000000
              ? "#67000d"
              : value > 500000
                ? "#a50f15"
                : value > 250000
                  ? "#cb181d"
                  : value > 125000
                    ? "#ef3b2c"
                    : value > 60000
                      ? "#fb6a4a"
                      : "#fcae91";
          } else if (region === "macro") {
            return value > 5000000
              ? "#084594"
              : value > 2500000
                ? "#2171b5"
                : value > 1250000
                  ? "#4292c6"
                  : value > 600000
                    ? "#6baed6"
                    : value > 300000
                      ? "#9ecae1"
                      : "#c6dbef";
          } else {
            return "#FFFFFF";
          }
        }

        // Xəritəni yarat - 1. HTML-dəki kimi
        function initMap() {
          map = new google.maps.Map(document.getElementById("map"), {
            center: { lat: 40.4093, lng: 49.8671 },
            zoom: 10,
            mapTypeControl: false,
            streetViewControl: false,
            fullscreenControl: true,
          });

          // İlk məlumatları yüklə
          loadGeoJSON();
        }

        // Get GeoJSON file path based on region
        function getGeoJsonFile(region) {
          if (region === "micro") return "files/zones_micro.json";
          if (region === "meso") return "files/zones_meso.json";
          if (region === "macro") return "files/zones_macro.json";
          return "";
        }

        // JSON faylı yüklə
        async function loadGeoJSON() {
          const region = regionFilter.value;
          const dataType = dataTypeFilter.value;
          const filePath = getGeoJsonFile(region);

          if (!filePath) return;

          try {
            const response = await fetch(filePath);
            if (!response.ok) throw new Error("Failed to load GeoJSON file");

            geojsonData = await response.json();
            renderMap(region, dataType);
          } catch (error) {
            console.error("Xəta:", error);
            alert("Failed to load GeoJSON data");
          }
        }

        // Xəritəni render et
        function renderMap(region, dataType) {
          // Köhnə layeri sil
          if (dataLayer) {
            dataLayer.setMap(null);
            dataLayer = null;
          }

          if (!geojsonData || !map) return;

          // Yeni data layer yarat
          dataLayer = new google.maps.Data();
          dataLayer.addGeoJson(geojsonData);

          // Styling tətbiq et
          dataLayer.setStyle(function (feature) {
            const value = feature.getProperty(dataType) || 0;
            return {
              fillColor: getColor(value, region),
              strokeColor: "#ffffff",
              strokeWeight: 1,
              fillOpacity: 0.7,
            };
          });

          // Click hadisəsi - info window
          const infowindow = new google.maps.InfoWindow();

          dataLayer.addListener("click", function (event) {
            const properties =
              event.feature.getProperty("properties") || event.feature.f;
            const micro =
              properties?.MICRO || event.feature.getProperty("MICRO") || "N/A";
            const meso =
              properties?.MESO || event.feature.getProperty("MESO") || "N/A";
            const macro =
              properties?.MACRO || event.feature.getProperty("MACRO") || "N/A";
            const population =
              properties?.population ||
              event.feature.getProperty("population") ||
              0;
            const jobs =
              properties?.tot_jobs ||
              event.feature.getProperty("tot_jobs") ||
              0;

            const content = `
        <div style="padding: 8px; min-width: 200px;">
          <strong>Micro:</strong> ${micro}<br>
          <strong>Meso:</strong> ${meso}<br>
          <strong>Macro:</strong> ${macro}<br>
          <hr style="margin: 8px 0;">
          <strong>Population:</strong> ${population.toLocaleString()}<br>
          <strong>Jobs:</strong> ${jobs.toLocaleString()}
        </div>
      `;

            infowindow.setContent(content);
            infowindow.setPosition(event.latLng);
            infowindow.open(map);
          });

          // Layer-i xəritəyə əlavə et
          dataLayer.setMap(map);
        }

        // Event listener-lar
        regionFilter.addEventListener("change", loadGeoJSON);
        dataTypeFilter.addEventListener("change", function () {
          const region = regionFilter.value;
          const dataType = dataTypeFilter.value;

          if (dataLayer && geojsonData) {
            dataLayer.setStyle(function (feature) {
              const value = feature.getProperty(dataType) || 0;
              return {
                fillColor: getColor(value, region),
                strokeColor: "#ffffff",
                strokeWeight: 1,
                fillOpacity: 0.7,
              };
            });
          }
        });

        // Səhifə yüklənəndə
        window.onload = initMap;
      </script>

    <script>
      $(async function () {
        try {
          let text = await fetch("files/ceck_in_buss.csv").then((r) =>
            r.text(),
          );
          let rows = text.trim().split("\n");

          // header
          let headers = rows.shift().split(",");

          // data
          let data = rows.map((r) => r.split(","));

          $("#myTable").DataTable({
            data: data,
            columns: headers.map((h) => ({ title: h })),
            language: {
              decimal: ",",
              thousands: ".",
              emptyTable: "No data available in table",
              info: "Showing _START_ to _END_ of _TOTAL_ entries",
              infoEmpty: "Showing 0 entries",
              infoFiltered: "(filtered from _MAX_ total entries)",
              lengthMenu: "Show _MENU_ entries per page",
              loadingRecords: "Loading...",
              processing: "Processing...",
              search: "Search:",
              zeroRecords: "No matching records found",
              paginate: {
                first: "First",
                last: "Last",
                next: "Next",
                previous: "Previous",
              },
            },
            pageLength: 10,
            order: [[0, "asc"]],
          });
        } catch (error) {
          console.error("Error loading CSV:", error);
        }
      });
    </script>
